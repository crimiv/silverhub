name: Lua Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, feat/** ]

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua + Luarocks
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 luarocks
          luarocks install luacheck
      - name: Run luacheck
        run: |
          luacheck --version || true
          luacheck . || true
      - name: Run luac syntax check
        run: |
          if command -v luac >/dev/null 2>&1; then
            echo "Running luac -p on .lua files"
            find . -name "*.lua" -print0 | xargs -0 -n1 luac -p || true
          else
            echo "luac not found; installing lua5.3"
            sudo apt-get update && sudo apt-get install -y lua5.3
            find . -name "*.lua" -print0 | xargs -0 -n1 luac -p || true
          fi
      - name: Run smoke tests
        run: |
          if command -v lua5.3 >/dev/null 2>&1; then
            lua5.3 ci/smoke.lua || true
          elif command -v lua >/dev/null 2>&1; then
            lua ci/smoke.lua || true
          else
            sudo apt-get update && sudo apt-get install -y lua5.3
            lua5.3 ci/smoke.lua || true
          fi
